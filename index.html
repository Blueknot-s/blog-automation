<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>제주 블로그 AI 파트너 | Gemini Edition</title>
<style>
:root { --primary: #4285f4; --bg: #0c1220; --card: #0f1929; --border: #1e293b; --text: #e2e8f0; --text-dim: #94a3b8; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.5}
#topbar{position:sticky;top:0;z-index:200;background:#080e1a;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
.logo{font-weight:900;font-size:16px;color:#fff;letter-spacing:-0.5px}
.auth-status{margin-left:auto; margin-right:15px; font-size:11px; color:#4285f4; font-weight:bold; background:rgba(66,133,244,0.1); padding:5px 12px; border-radius:20px; border:1px solid rgba(66,133,244,0.3); display:flex; align-items:center; gap:6px}
.auth-dot{width:6px; height:6px; background:#4285f4; border-radius:50%; box-shadow:0 0 8px #4285f4}
#steps{display:flex;gap:6px}.step-pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;background:#0f172a;color:#475569;border:1px solid transparent}.step-pill.active{background:#1e3a8a;color:#fff;border-color:var(--primary)}.step-pill.done{background:#1d4ed8;color:#fff}
#app{max-width:880px;margin:0 auto;padding:30px 20px}.page{display:none;animation:fadeIn 0.3s ease}.page.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.box-title{font-size:12px;font-weight:800;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
#ch-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:14px}
.ch-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:22px;cursor:pointer;transition:all 0.2s}.ch-card:hover{transform:translateY(-3px); border-color:#334155}.ch-card.sel{background:rgba(30,58,138,0.2)}
#upload-zone{border:2px dashed var(--border);border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;color:var(--text-dim);background:#080e1a}
#upload-zone.dragover{border-color:var(--primary); background:rgba(66,133,244,0.05); color:var(--primary)}
#uploads-list{margin-top:16px; display:grid; gap:10px}
.upload-item{display:flex; align-items:center; gap:12px; background:#080e1a; border:1px solid var(--border); border-radius:10px; padding:12px 16px}
.img-preview-mini{width:45px; height:45px; border-radius:6px; object-fit:cover}
.pos-select{background:#0f172a; color:#fff; border:1px solid #334155; border-radius:6px; font-size:12px; padding:6px 10px; cursor:pointer}
input[type=text], textarea{width:100%;background:#080e1a;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:#fff;font-size:14px;outline:none;margin-bottom:14px}
.btn-row{display:flex;gap:10px;justify-content:space-between;margin-top:10px}
.btn{border:none;border-radius:10px;padding:14px 28px;font-size:14px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px;color:#fff}
.btn:disabled{opacity:0.3;cursor:not-allowed}.btn-ghost{background:var(--card);color:var(--text-dim);border:1px solid var(--border);border-radius:10px;padding:14px 24px;font-weight:700}
#loading{text-align:center;padding:80px 0;display:none}.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
#result-area{display:none}
pre.code{background:#080e1a;padding:20px;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:monospace;max-height:500px;overflow-y:auto}
.tab-pane { display: none; }
.tab-pane.active { display: block; }
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:14px 28px;border-radius:12px;box-shadow:0 10px 20px rgba(0,0,0,0.4);font-weight:700;display:none;z-index:99999}

/* ←←← 여기서부터 미리보기 창 CSS 복원 (이게 빠져서 닫기 버튼이 보였어요!) */
#preview-screen{display:none;position:fixed;inset:0;z-index:9999;flex-direction:column;background:#000}
#preview-screen.open{display:flex}
#preview-bar{background:#080e1a;padding:15px 25px;display:flex;align-items:center;justify-content:space-between}
#preview-frame{width:100%;border:none;flex:1;background:#fff}
</style>
</head>
<body>

  </div>
  <iframe id="preview-frame"></iframe>
</div>

<div id="toast"></div>
